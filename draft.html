<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>T&L Draft Tool - Season 1</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b14;--surface:#111220;--surface2:#181929;--surface3:#1f2035;
  --border:#2a2c45;--border2:#353760;
  --purple:#7c6ff7;--purple2:#5a54c4;--purple3:#3d3882;
  --teal:#2dd4bf;--teal2:#1a7a6e;
  --gold:#f0c060;--gold2:#b08840;
  --red:#f87171;--red2:#991b1b;
  --green:#4ade80;--green2:#166534;
  --orange:#fb923c;
  --text:#e2e4f0;--text2:#9095b8;--text3:#5a5f80;
  --tank:#60a5fa;--dps:#f87171;--healer:#4ade80;--any:#9095b8;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--surface);border:1px solid var(--border2);padding:2.5rem;width:340px;text-align:center}
.login-box h1{font-size:1.3rem;font-weight:700;color:var(--purple);margin-bottom:0.25rem}
.login-box p{color:var(--text2);font-size:0.82rem;margin-bottom:1.5rem}
.login-box input{width:100%;padding:0.55rem 0.8rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:0.88rem;margin-bottom:0.75rem;outline:none}
.login-box input:focus{border-color:var(--purple)}
.login-box button{width:100%;padding:0.6rem;background:var(--purple2);color:#fff;border:none;cursor:pointer;font-size:0.88rem;font-weight:600}
.login-box button:hover{background:var(--purple)}
.login-err{color:var(--red);font-size:0.78rem;margin-top:0.4rem}
#app{display:none;flex-direction:column;height:100vh}
#app.show{display:flex}
.pause-bar{background:var(--orange);color:#000;text-align:center;padding:0.28rem;font-weight:700;font-size:0.82rem;display:none}
.pause-bar.on{display:block}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0.45rem 0.9rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.logo{font-size:0.9rem;font-weight:700;color:var(--purple);white-space:nowrap}
.hcenter{flex:1;display:flex;align-items:center;justify-content:center;gap:1.25rem}
.tlabel{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.tval{font-size:0.9rem;font-weight:700}
.timer-wrap{position:relative;width:44px;height:44px}
.timer-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-wrap circle{fill:none;stroke-width:3}
.tbg{stroke:var(--border)}.tfg{stroke:var(--teal);stroke-dasharray:126;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .5s}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700}
.hright{display:flex;align-items:center;gap:0.45rem}
.btn{padding:.3rem .7rem;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:.72rem;border-radius:2px;white-space:nowrap}
.btn:hover{border-color:var(--border2);background:var(--surface3)}
.btn.danger{border-color:var(--red2);color:var(--red)}.btn.danger:hover{background:var(--red2)}
.btn.ok{border-color:var(--teal2);color:var(--teal)}.btn.ok:hover{background:var(--teal2)}
.btn.primary{border-color:var(--purple2);background:var(--purple2);color:#fff}.btn.primary:hover{background:var(--purple)}
main{flex:1;display:grid;grid-template-columns:290px 1fr 250px;overflow:hidden}
#pool-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:.55rem .65rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.ptitle{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.pbadge{background:var(--surface3);color:var(--text2);padding:.08rem .4rem;border-radius:2px;font-size:.68rem}
.sbar{padding:.45rem .65rem;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:.35rem}
.sbar input{width:100%;padding:.35rem .55rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:.82rem;outline:none}
.sbar input:focus{border-color:var(--purple)}
.frow{display:flex;gap:.25rem;flex-wrap:wrap}
.fb{padding:.18rem .45rem;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:.67rem;border-radius:2px}
.fb.act{background:var(--purple3);border-color:var(--purple2);color:var(--text)}
.fb.rt.act{background:#1e3a5f;border-color:var(--tank);color:var(--tank)}
.fb.rd.act{background:#4a1515;border-color:var(--dps);color:var(--dps)}
.fb.rh.act{background:#14432a;border-color:var(--healer);color:var(--healer)}
.plist{flex:1;overflow-y:auto;padding:.2rem}
.pi{padding:.42rem .55rem;cursor:pointer;border:1px solid transparent;border-radius:2px;margin-bottom:2px;display:flex;align-items:center;gap:.4rem}
.pi:hover{background:var(--surface2);border-color:var(--border)}
.pi.sel{background:var(--surface3);border-color:var(--purple2)}
.pi.hw{background:#0d2a1a;border-color:var(--green2)}
.pi.hn{background:#2a0d0d;border-color:var(--red2);opacity:.5}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rdot.Tank{background:var(--tank)}.rdot.DPS{background:var(--dps)}.rdot.Healer{background:var(--healer)}
.pname{font-size:.88rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcls{font-size:.75rem;color:var(--text2);white-space:nowrap}
.wi{font-size:.65rem;color:var(--green);margin-left:auto}.ni{font-size:.65rem;color:var(--red);margin-left:auto}
#roster-panel{background:var(--bg);overflow-y:auto;padding:.65rem}
.ctabs{display:flex;gap:.25rem;margin-bottom:.5rem;flex-wrap:wrap}
.ctab{padding:.35rem .8rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.72rem;border-radius:2px;color:var(--text2)}
.ctab.act{border-color:var(--purple2);background:var(--purple3);color:var(--text)}
.rsec{margin-bottom:.85rem}
.rsec-title{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);margin-bottom:.35rem;padding:.2rem .4rem;border-left:2px solid var(--teal2);display:flex;justify-content:space-between;align-items:center}
.rslot{background:var(--surface);border:1px solid var(--border);padding:.28rem .45rem;min-height:28px;display:flex;align-items:center;gap:.35rem;cursor:pointer;border-radius:2px;margin-bottom:2px}
.rslot:hover{border-color:var(--border2)}.rslot.filled:hover{border-color:var(--purple2)}
.stype{font-size:.6rem;color:var(--text3);white-space:nowrap;min-width:52px}
.stype.Any{color:var(--any)}.stype.Tank{color:var(--tank)}.stype.DPS{color:var(--dps)}.stype.Support{color:var(--healer)}.stype.Spinner{color:var(--orange)}
.splayer{font-size:.78rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sempty{font-size:.65rem;color:var(--text3);font-style:italic}
#info-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pdet{padding:.7rem;flex:1;overflow-y:auto}
.dname{font-size:.95rem;font-weight:700;margin-bottom:.18rem}
.dcls{font-size:.75rem;color:var(--text2);margin-bottom:.6rem}
.dsec{margin-bottom:.6rem}.dlbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.22rem}
.dval{font-size:.78rem;color:var(--text);background:var(--surface2);padding:.35rem .55rem;border-radius:2px}
.dtag{display:inline-block;padding:.12rem .45rem;border-radius:2px;font-size:.68rem;margin:.08rem;border:1px solid}
.tw{background:#0d2a1a;border-color:var(--green2);color:var(--green)}
.tn{background:#2a0d0d;border-color:var(--red2);color:var(--red)}
.ta{background:#2a1d00;border-color:var(--gold2);color:var(--gold)}
.pbtn{width:100%;padding:.55rem;background:var(--purple2);color:#fff;border:none;cursor:pointer;font-size:.82rem;font-weight:600;margin-top:.45rem;border-radius:2px}
.pbtn:hover{background:var(--purple)}
.nosel{padding:.85rem;color:var(--text3);font-size:.78rem;text-align:center}
.hkhint{font-size:.65rem;color:var(--text3);text-align:center;padding:.3rem;border-top:1px solid var(--border)}
#pick-feed{background:var(--surface2);border-top:1px solid var(--border);flex-shrink:0;max-height:120px;overflow-y:auto}
.feed-title{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:.25rem .65rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface2)}
.fe{padding:.18rem .65rem;font-size:.72rem;color:var(--text2);border-bottom:1px solid var(--border);display:flex;gap:.55rem;align-items:center}
.fe-pick{color:var(--gold);font-weight:500}
.fe-skip{color:var(--orange)}
#logpanel{background:var(--bg);border-top:1px solid var(--border);max-height:50px;overflow-y:auto;flex-shrink:0}
.le{padding:.15rem .65rem;font-size:.68rem;color:var(--text3);border-bottom:1px solid var(--border);display:flex;gap:.55rem}
#smodal,#amodal,#mvmodal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:500}
#smodal.open,#amodal.open,#mvmodal.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border2);padding:1.1rem;width:370px;max-height:78vh;overflow-y:auto}
.mbox h3{font-size:.85rem;font-weight:600;margin-bottom:.85rem;color:var(--purple)}
.sopt{padding:.42rem .65rem;border:1px solid var(--border);cursor:pointer;margin-bottom:.25rem;border-radius:2px;display:flex;align-items:center;gap:.42rem;font-size:.76rem}
.sopt:hover{border-color:var(--purple2);background:var(--surface2)}
.sopt-party{font-size:.65rem;color:var(--teal);min-width:120px;font-weight:600}
.sopt-type{font-size:.62rem;color:var(--text2)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:.42rem;margin-bottom:.8rem}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h1>T&amp;L Draft Tool</h1>
    <p>Season 1 · Captain Access</p>
    <input type="password" id="pwin" placeholder="Enter password..." onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Enter Draft Room</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>
<div id="app">
  <div class="pause-bar" id="pbar">⏸ DRAFT PAUSED</div>
  <header>
    <div class="logo">T&amp;L Draft S1</div>
    <div class="hcenter">
      <div><div class="tlabel">Now Picking</div><div class="tval" id="tcap" style="color:var(--purple)">—</div></div>
      <div class="timer-wrap">
        <svg viewBox="0 0 44 44"><circle class="tbg" cx="22" cy="22" r="20"/><circle class="tfg" id="tcirc" cx="22" cy="22" r="20"/></svg>
        <div class="tnum" id="tnum">40</div>
      </div>
      <div><div class="tlabel">Up Next</div><div class="tval" id="tnext" style="font-size:.82rem;color:var(--text2)">—</div></div>
      <div style="text-align:center"><div class="tlabel">Round</div><div class="tval" style="color:var(--teal)" id="rnum">1</div></div>
      <div style="text-align:center"><div class="tlabel">Pick</div><div class="tval" id="pnum">1/192</div></div>
      <div style="text-align:center"><div class="tlabel">Pool</div><div class="tval" id="premain">336</div></div>
    </div>
    <div class="hright">
      <span style="font-size:.65rem;color:var(--text3)">Stream:</span>
      <button class="btn" id="stbtn" onclick="toggleStream()">Notes ON</button>
      <button class="btn" onclick="openAdmin()">Admin</button>
    </div>
  </header>
  <main>
    <div id="pool-panel">
      <div class="ph"><span class="ptitle">Player Pool</span><span class="pbadge" id="pcbadge">336</span></div>
      <div class="sbar">
        <input type="text" id="srch" placeholder="Search name or class..." oninput="filterP()"/>
        <div class="frow" id="rfrow">
          <button class="fb act" onclick="setRF('All',this)">All</button>
          <button class="fb rt" onclick="setRF('Tank',this)">Tank</button>
          <button class="fb rd" onclick="setRF('DPS',this)">DPS</button>
          <button class="fb rh" onclick="setRF('Healer',this)">Healer</button>
        </div>
        <div class="frow" id="cfrow" style="max-height:52px;overflow-y:auto;gap:.2rem"></div>
      </div>
      <div class="plist" id="plist"></div>
    </div>
    <div id="roster-panel">
      <div class="ctabs" id="ctabs"></div>
      <div id="rboard"></div>
    </div>
    <div id="info-panel">
      <div class="ph"><span class="ptitle">Player Info</span></div>
      <div class="pdet" id="pdet"><div class="nosel">Click a player to view details</div></div>
      <div class="hkhint">Press N to toggle stream mode</div>
    </div>
  </main>
  <div id="pick-feed"><div class="feed-title">📢 Live Pick Feed</div><div id="feed-entries"></div></div>
  <div id="logpanel"></div>
</div>
<div id="smodal">
  <div class="mbox">
    <h3 id="smtitle">Place player</h3>
    <div id="smopts"></div>
    <button class="btn" style="margin-top:.42rem;width:100%" onclick="closeSM()">Cancel</button>
  </div>
</div>
<div id="mvmodal">
  <div class="mbox">
    <h3 id="mvtitle">Move player</h3>
    <div id="mvopts"></div>
    <button class="btn" style="margin-top:.42rem;width:100%" onclick="closeMV()">Cancel</button>
  </div>
</div>
<div id="amodal">
  <div class="mbox">
    <h3>Admin Controls</h3>
    <div class="agrid">
      <button class="btn ok" onclick="adm('pause')">⏸ Pause</button>
      <button class="btn primary" onclick="adm('resume')">▶ Resume</button>
      <button class="btn" onclick="adm('undo')">↩ Undo Pick</button>
      <button class="btn" onclick="adm('skip')">⏭ Skip Turn</button>
      <button class="btn" onclick="adm('rtimer')">⏱ Reset Timer</button>
      <button class="btn danger" onclick="adm('reset')">⚠ Reset All</button>
    </div>
    <div style="margin-bottom:.65rem">
      <div class="dlbl" style="margin-bottom:.32rem">Force turn:</div>
      <div style="display:flex;gap:.32rem;flex-wrap:wrap" id="ftbtns"></div>
    </div>
    <button class="btn" style="width:100%" onclick="closeAdmin()">Close</button>
  </div>
</div>
<script>
const PW='mizzelleisthebest';
const CIRC=2*Math.PI*20;
const TSEC=40;
const CAPS=[
  {id:'arelite',name:'Arelite',color:'#7c6ff7',co:'Zaels'},
  {id:'rheggie',name:'Rheggie',color:'#2dd4bf',co:'Ruthless'},
  {id:'bora',name:'Bora',color:'#f0c060',co:'Soju'},
  {id:'wicked',name:'Wicked',color:'#f87171',co:'Rosie'},
];

function genOrder(n){const o=[];let r=1,pk=0;while(pk<n){const ev=r%2===0;const seq=ev?[3,2,1,0]:[0,1,2,3];for(const i of seq){if(pk>=n)break;o.push({ci:i,r});pk++;}r++;}return o;}
const ORD=genOrder(192);

const PARTY_DEFS=[
  {key:'p1',label:'Party 1 — Objective',prefix:'p1',slots:[
    {t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},
    {t:'Tank',lb:'Tank'},{t:'Any',lb:'Any Role'},{t:'Support',lb:'Support'},
  ]},
  {key:'p2',label:'Party 2 — Spinner/DPS',prefix:'p2',slots:[
    {t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'Spinner',lb:'Spinner/DPS'},
    {t:'Spinner',lb:'Spinner/DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p3',label:'Party 3 — Flex',prefix:'p3',slots:[
    {t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p4',label:'Party 4 — Flex',prefix:'p4',slots:[
    {t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p5',label:'Party 5 — Flex',prefix:'p5',slots:[
    {t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p6',label:'Party 6 — Flex',prefix:'p6',slots:[
    {t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p7',label:'Party 7 — 3 DPS',prefix:'p7',slots:[
    {t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
  {key:'p8',label:'Party 8 — 3 DPS',prefix:'p8',slots:[
    {t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},
    {t:'DPS',lb:'DPS'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
  ]},
];

function buildSlots(){
  const s={};
  for(const c of CAPS){
    const l=[];
    for(const party of PARTY_DEFS){
      for(let i=0;i<party.slots.length;i++){
        l.push({id:`${c.id}-${party.prefix}-s${i}`,party:party.label,sec:party.label,t:party.slots[i].t,lb:party.slots[i].lb,player:null});
      }
    }
    const subDef=[
      {t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},
      {t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'},
      {t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},
      {t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},
      {t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
      {t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},
    ];
    for(let i=0;i<subDef.length;i++){
      l.push({id:`${c.id}-sub-s${i}`,party:'Subs',sec:'Subs',t:subDef[i].t,lb:subDef[i].lb,player:null});
    }
    s[c.id]=l;
  }
  return s;
}

function prePlaceCaptains(slots){
  const placements=[
    {capId:'arelite',playerId:'arelite',slotId:'arelite-sub-s0'},
    {capId:'arelite',playerId:'zaels',  slotId:'arelite-sub-s1'},
    {capId:'rheggie',playerId:'rheggie',slotId:'rheggie-sub-s0'},
    {capId:'rheggie',playerId:'ruthless',slotId:'rheggie-sub-s1'},
    {capId:'bora',   playerId:'bora',   slotId:'bora-sub-s0'},
    {capId:'bora',   playerId:'soju',   slotId:'bora-sub-s1'},
    {capId:'wicked', playerId:'wicked', slotId:'wicked-sub-s0'},
    {capId:'wicked', playerId:'rosie',  slotId:'wicked-sub-s1'},
  ];
  for(const p of placements){
    const slot=slots[p.capId].find(s=>s.id===p.slotId);
    const player=PL.find(pl=>pl.id===p.playerId);
    if(slot&&player)slot.player=player;
  }
  return slots;
}

const PL=[
  {id:'arelite',n:'Arelite',role:'Tank',cls:'Crusader',alts:'',notes:'Captain',w:[],x:[]},
  {id:'zaels',n:'Zaels',role:'Tank',cls:'Warden',alts:'',notes:'Co-Captain Arelite team',w:[],x:[]},
  {id:'rheggie',n:'Rheggie',role:'Tank',cls:'Crusader',alts:'Warden',notes:'Captain',w:[],x:[]},
  {id:'ruthless',n:'Ruthlessssssss',role:'Tank',cls:'Steelheart',alts:'Crusader',notes:'Co-Captain Rheggie team',w:[],x:[]},
  {id:'bora',n:'Bora',role:'Tank',cls:'Berserker',alts:'',notes:'Captain',w:[],x:[]},
  {id:'soju',n:'Soju',role:'Healer',cls:'Seeker',alts:'',notes:'Co-Captain Bora team',w:[],x:[]},
  {id:'wicked',n:'Wicked',role:'Tank',cls:'Crusader',alts:'',notes:'Captain',w:[],x:[]},
  {id:'rosie',n:'Rosie・',role:'Healer',cls:'Seeker',alts:'',notes:'Co-Captain Wicked team',w:['ossenagon'],x:[]},
  {id:'keraunosv',n:'Keraunosツ',role:'Healer',cls:'Oracle',alts:'',notes:'',w:[],x:[]},
  {id:'pewf',n:'Pewf',role:'DPS',cls:'Fury',alts:'',notes:'',w:[],x:[]},
  {id:'bearsawed',n:'BEARSAWED',role:'Healer',cls:'Oracle',alts:'Fury, Scout',notes:'',w:[],x:[]},
  {id:'katie',n:'Katie',role:'DPS',cls:'Enigma',alts:'Liberator',notes:'',w:[],x:[]},

function doLogin(){
  if(document.getElementById('pwin').value===PW){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    init();
  }else{document.getElementById('lerr').textContent='Incorrect password.';}
}

function init(){buildCF();buildCtabs();buildRboard();buildFTbtns();updateTurn();startTimer();buildPlist();}

function startTimer(){
  clearInterval(S.tint);S.tsec=TSEC;updTimer();
  S.tint=setInterval(()=>{if(S.paused)return;S.tsec--;updTimer();if(S.tsec<=0)skipTurn();},1000);
}

function updTimer(){
  const n=document.getElementById('tnum'),c=document.getElementById('tcirc');
  if(!n||!c)return;
  n.textContent=S.tsec;
  c.style.strokeDashoffset=CIRC*(1-S.tsec/TSEC);
  c.style.stroke=S.tsec>15?'var(--teal)':S.tsec>7?'var(--orange)':'var(--red)';
}

function getCap(){return CAPS[ORD[Math.min(S.pickIdx,ORD.length-1)].ci];}
function getNxt(){const ni=S.pickIdx+1;if(ni>=ORD.length)return null;return CAPS[ORD[ni].ci];}

function updateTurn(){
  const c=getCap(),nx=getNxt();
  const rnd=ORD[Math.min(S.pickIdx,ORD.length-1)].r;
  document.getElementById('tcap').textContent=c.name;
  document.getElementById('tcap').style.color=c.color;
  document.getElementById('tnext').textContent=nx?nx.name:'—';
  document.getElementById('rnum').textContent=rnd;
  document.getElementById('pnum').textContent=`${S.pickIdx+1}/192`;
  S.viewCap=c.id;
  buildCtabs();buildRboard();
}

function skipTurn(){addFeed(null,getCap(),'');advTurn();}

function advTurn(){
  S.pickIdx++;
  if(S.pickIdx>=ORD.length){clearInterval(S.tint);alert('Draft Complete!');return;}
  updateTurn();startTimer();
}

function getDraftedIds(){
  const s=new Set();
  for(const c of CAPS)for(const sl of S.slots[c.id])if(sl.player)s.add(sl.player.id);
  return s;
}

function buildCF(){
  const cls=[...new Set(PL.map(p=>p.cls))].sort();
  document.getElementById('cfrow').innerHTML=cls.map(c=>`<button class="fb" onclick="setCF('${c}',this)">${c}</button>`).join('');
}

function setCF(c,btn){
  CF=CF===c?'':c;
  document.querySelectorAll('#cfrow .fb').forEach(b=>b.classList.remove('act'));
  if(CF)btn.classList.add('act');
  buildPlist();
}

function setRF(r,btn){
  RF=r;
  document.querySelectorAll('#rfrow .fb').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  buildPlist();
}

function filterP(){ST=document.getElementById('srch').value.toLowerCase();buildPlist();}

function isOffSpec(p){
  if(!CF)return false;
  return p.cls!==CF&&p.alts.toLowerCase().split(',').map(a=>a.trim()).includes(CF.toLowerCase());
}

function buildPlist(){
  const drafted=getDraftedIds();
  const wids=new Set(S.sel?S.sel.w:[]);
  const xids=new Set(S.sel?S.sel.x:[]);
  const fl=PL.filter(p=>{
    if(drafted.has(p.id))return false;
    if(RF!=='All'&&p.role!==RF)return false;
    if(ST&&!p.n.toLowerCase().includes(ST)&&!p.cls.toLowerCase().includes(ST)&&!p.alts.toLowerCase().includes(ST))return false;
    if(CF){
      const mainMatch=p.cls===CF;
      const altMatch=p.alts.toLowerCase().split(',').map(a=>a.trim()).includes(CF.toLowerCase());
      if(!mainMatch&&!altMatch)return false;
    }
    return true;
  });
  document.getElementById('pcbadge').textContent=fl.length;
  document.getElementById('premain').textContent=PL.length-drafted.size;
  document.getElementById('plist').innerHTML=fl.map(p=>{
    const iw=wids.has(p.id),ix=xids.has(p.id),is=S.sel?.id===p.id;
    const offSpec=isOffSpec(p);
    let cls='pi';
    if(is)cls+=' sel';else if(iw)cls+=' hw';else if(ix)cls+=' hn';
    const offTag=offSpec?`<span style="font-size:.62rem;color:var(--orange);border:1px solid var(--orange);border-radius:2px;padding:.05rem .3rem;margin-left:.2rem;flex-shrink:0">off spec</span>`:'';
    return `<div class="${cls}" onclick="selP('${p.id}')">
      <div class="rdot ${p.role}"></div>
      <span class="pname">${p.n}</span>
      ${offTag}
      <span class="pcls">${p.cls}</span>
      ${iw?'<span class="wi">♥</span>':ix?'<span class="ni">✕</span>':''}
    </div>`;
  }).join('');
}

function selP(id){S.sel=PL.find(p=>p.id===id)||null;buildPlist();renderDet();}

function renderDet(){
  const panel=document.getElementById('pdet');
  const p=S.sel;
  if(!p){panel.innerHTML='<div class="nosel">Click a player to view details</div>';return;}
  const cap=getCap();
  let wh='',xh='',nh='';
  if(p.w.length&&!S.stream){
    wh=`<div class="dsec"><div class="dlbl">Wants to play with</div>${p.w.map(id=>{const pl=PL.find(x=>x.id===id);return`<span class="dtag tw">${pl?pl.n:id}</span>`;}).join('')}</div>`;
  }
  if(p.x.length&&!S.stream){
    xh=`<div class="dsec"><div class="dlbl">Won't play with</div>${p.x.map(id=>{const pl=PL.find(x=>x.id===id);return`<span class="dtag tn">${pl?pl.n:id}</span>`;}).join('')}</div>`;
  }
  if(p.notes&&!S.stream){
    nh=`<div class="dsec"><div class="dlbl">Notes</div><div class="dval">${p.notes}</div></div>`;
  }else if(S.stream){
    nh=`<div class="dsec"><div class="dlbl" style="color:var(--text3)">[Stream mode — notes hidden]</div></div>`;
  }
  const avail=p.notes.includes('⚠')?`<div style="margin-bottom:.45rem"><span class="dtag ta">⚠ ${p.notes.split('⚠')[1]?.trim()||'Restriction'}</span></div>`:'';
  const capTag=(p.notes==='Captain'||p.notes.includes('Co-Captain'))?`<div style="margin-bottom:.45rem"><span style="font-size:.65rem;color:var(--gold);border:1px solid var(--gold2);border-radius:2px;padding:.08rem .4rem">${p.notes}</span></div>`:'';
  panel.innerHTML=`
    <div class="dname">${p.n}</div>
    <div class="dcls">${p.cls} · ${p.role}</div>
    ${capTag}
    ${p.alts?`<div style="font-size:.7rem;color:var(--text2);margin-bottom:.5rem">Alts: ${p.alts}</div>`:''}
    ${avail}
    ${wh}${xh}${nh}
    <button class="pbtn" onclick="pickP()">Draft for ${cap.name}</button>`;
}

function pickP(){if(S.sel)openSM(S.sel,getCap());}

function openSM(player,cap){
  document.getElementById('smtitle').textContent=`Place ${player.n} — ${cap.name}`;
  const empty=S.slots[cap.id].filter(s=>!s.player);
  document.getElementById('smopts').innerHTML=empty.length?empty.map(s=>`
    <div class="sopt" onclick="confirmPick('${s.id}')">
      <span class="sopt-party">${s.party}</span>
      <span class="sopt-type ${s.t}">${s.lb}</span>
    </div>`).join(''):`<p style="color:var(--text3);font-size:.78rem">No empty slots</p>`;
  document.getElementById('smodal').classList.add('open');
}
function closeSM(){document.getElementById('smodal').classList.remove('open');}

function confirmPick(slotId){
  const cap=getCap();
  const slot=S.slots[cap.id].find(s=>s.id===slotId);
  if(!slot||!S.sel)return;
  slot.player=S.sel;
  addFeed(S.sel,cap,`${slot.party} / ${slot.lb}`);
  closeSM();S.sel=null;
  buildPlist();renderDet();buildRboard();advTurn();
}

function openMV(slotId){
  let ownerCap=null,sourceSlot=null;
  for(const c of CAPS){
    const sl=S.slots[c.id].find(s=>s.id===slotId);
    if(sl&&sl.player){ownerCap=c;sourceSlot=sl;break;}
  }
  if(!ownerCap||!sourceSlot)return;
  S.movePlayer={player:sourceSlot.player,sourceSlotId:slotId,capId:ownerCap.id};
  document.getElementById('mvtitle').textContent=`Move ${sourceSlot.player.n} to different slot`;
  const empty=S.slots[ownerCap.id].filter(s=>!s.player);
  document.getElementById('mvopts').innerHTML=empty.length?empty.map(s=>`
    <div class="sopt" onclick="confirmMove('${s.id}')">
      <span class="sopt-party">${s.party}</span>
      <span class="sopt-type ${s.t}">${s.lb}</span>
    </div>`).join(''):`<p style="color:var(--text3);font-size:.78rem">No other empty slots</p>`;
  document.getElementById('mvmodal').classList.add('open');
}
function closeMV(){document.getElementById('mvmodal').classList.remove('open');S.movePlayer=null;}

function confirmMove(newSlotId){
  if(!S.movePlayer)return;
  const{player,sourceSlotId,capId}=S.movePlayer;
  const sourceSlot=S.slots[capId].find(s=>s.id===sourceSlotId);
  const newSlot=S.slots[capId].find(s=>s.id===newSlotId);
  if(!sourceSlot||!newSlot)return;
  sourceSlot.player=null;
  newSlot.player=player;
  closeMV();buildRboard();
}

function addFeed(player,cap,slot){
  const feed=document.getElementById('feed-entries');
  const e=document.createElement('div');e.className='fe';
  if(player){
    e.innerHTML=`<span style="color:${cap.color};font-weight:600;min-width:58px">${cap.name}</span><span class="fe-pick">${player.n}</span><span style="color:var(--text3);font-size:.65rem">${player.cls}</span><span style="color:var(--text3);font-size:.65rem">→ ${slot}</span>`;
  }else{
    e.innerHTML=`<span style="color:${cap.color};font-weight:600;min-width:58px">${cap.name}</span><span class="fe-skip">skipped turn</span>`;
  }
  feed.insertBefore(e,feed.firstChild);
  S.log.push({idx:S.pickIdx,player,cap:cap.name,slot});
}

function buildCtabs(){
  document.getElementById('ctabs').innerHTML=CAPS.map(c=>`
    <button class="ctab ${S.viewCap===c.id?'act':''}" onclick="viewCap('${c.id}')" style="${S.viewCap===c.id?`border-color:${c.color};color:${c.color}`:''}">
      ${c.name} <span style="font-size:.62rem;color:var(--text3)">${S.slots[c.id].filter(s=>s.player).length}/66</span>
    </button>`).join('');
}

function viewCap(id){S.viewCap=id;buildCtabs();buildRboard();}

function buildRboard(){
  const slots=S.slots[S.viewCap];
  const cap=CAPS.find(c=>c.id===S.viewCap);

  const partySections=PARTY_DEFS.map(party=>{
    const ps=slots.filter(s=>s.id.startsWith(`${S.viewCap}-${party.prefix}-`));
    const filled=ps.filter(s=>s.player).length;
    return `<div class="rsec">
      <div class="rsec-title">
        <span>${party.label}</span>
        <span style="font-size:.65rem;color:var(--text3);font-weight:400">${filled}/6</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        ${ps.map(s=>{
          if(s.player){
            const isCap=s.player.notes==='Captain'||s.player.notes.includes('Co-Captain');
            return `<div class="rslot filled" onclick="openMV('${s.id}')" title="Click to move" style="border-color:${isCap?cap.color:'var(--border)'}">
              <div class="rdot ${s.player.role}" style="flex-shrink:0"></div>
              <span class="splayer">${s.player.n}</span>
              <span style="font-size:.58rem;color:var(--text3);margin-left:auto;white-space:nowrap">${s.lb}</span>
              <span style="font-size:.6rem;color:var(--purple2);margin-left:.3rem;flex-shrink:0">⇄</span>
            </div>`;
          }
          return `<div class="rslot">
            <span class="stype ${s.t}">${s.lb}</span>
            <span class="sempty">empty</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  const subSlots=slots.filter(s=>s.id.startsWith(`${S.viewCap}-sub-`));
  const filled=subSlots.filter(s=>s.player).length;
  const subRows=[];
  for(let i=0;i<subSlots.length;i+=3)subRows.push(subSlots.slice(i,i+3));
  const subSection=`<div class="rsec">
    <div class="rsec-title" style="color:var(--gold)">
      <span>Subs</span>
      <span style="font-size:.65rem;color:var(--text3);font-weight:400">${filled}/18</span>
    </div>
    ${subRows.map(row=>`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:2px">
        ${row.map(s=>{
          if(s.player){
            const isCap=s.player.notes==='Captain'||s.player.notes.includes('Co-Captain');
            return `<div class="rslot filled" onclick="openMV('${s.id}')" title="Click to move" style="border-color:${isCap?cap.color:'var(--border)'}">
              <div class="rdot ${s.player.role}" style="flex-shrink:0"></div>
              <span class="splayer">${s.player.n}</span>
              <span style="font-size:.6rem;color:var(--purple2);margin-left:auto;flex-shrink:0">⇄</span>
            </div>`;
          }
          return `<div class="rslot"><span class="stype ${s.t}">${s.lb}</span><span class="sempty">empty</span></div>`;
        }).join('')}
      </div>`).join('')}
  </div>`;

  document.getElementById('rboard').innerHTML=partySections+subSection;
}

function toggleStream(){
  S.stream=!S.stream;
  document.getElementById('stbtn').textContent=S.stream?'Notes OFF':'Notes ON';
  if(S.sel)renderDet();
}

function openAdmin(){document.getElementById('amodal').classList.add('open');}
function closeAdmin(){document.getElementById('amodal').classList.remove('open');}

function buildFTbtns(){
  document.getElementById('ftbtns').innerHTML=CAPS.map((c,i)=>
    `<button class="btn" style="border-color:${c.color};color:${c.color}" onclick="forceTurn(${i})">${c.name}</button>`).join('');
}

function forceTurn(idx){
  clearInterval(S.tint);
  for(let i=S.pickIdx;i<ORD.length;i++){if(ORD[i].ci===idx){S.pickIdx=i;break;}}
  updateTurn();startTimer();closeAdmin();
}

function adm(a){
  if(a==='pause'){S.paused=true;document.getElementById('pbar').classList.add('on');}
  else if(a==='resume'){S.paused=false;document.getElementById('pbar').classList.remove('on');}
  else if(a==='skip'){skipTurn();closeAdmin();}
  else if(a==='undo'){
    if(!S.log.length)return;
    const last=S.log.pop();
    if(last.player){
      for(const c of CAPS){
        const sl=S.slots[c.id].find(s=>s.player?.id===last.player.id);
        if(sl){sl.player=null;break;}
      }
      const feed=document.getElementById('feed-entries');
      if(feed.firstChild)feed.removeChild(feed.firstChild);
    }
    S.pickIdx=Math.max(0,S.pickIdx-1);
    updateTurn();startTimer();buildPlist();buildRboard();closeAdmin();
  }
  else if(a==='rtimer'){startTimer();closeAdmin();}
  else if(a==='reset'){
    if(!confirm('Reset entire draft? All picks will be lost!'))return;
    S.slots=prePlaceCaptains(buildSlots());
    S.pickIdx=0;S.log=[];S.sel=null;S.movePlayer=null;
    updateTurn();startTimer();buildPlist();buildRboard();
    document.getElementById('feed-entries').innerHTML='';closeAdmin();
  }
}

document.addEventListener('keydown',e=>{
  if((e.key==='n'||e.key==='N')&&document.activeElement.tagName!=='INPUT')toggleStream();
});
document.getElementById('smodal').addEventListener('click',e=>{if(e.target===document.getElementById('smodal'))closeSM();});
document.getElementById('mvmodal').addEventListener('click',e=>{if(e.target===document.getElementById('mvmodal'))closeMV();});
document.getElementById('amodal').addEventListener('click',e=>{if(e.target===document.getElementById('amodal'))closeAdmin();});
</script>
</body>
</html>
