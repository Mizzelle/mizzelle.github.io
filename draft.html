<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>T&L Draft Tool - Season 1</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b14;--surface:#111220;--surface2:#181929;--surface3:#1f2035;
  --border:#2a2c45;--border2:#353760;
  --purple:#7c6ff7;--purple2:#5a54c4;--purple3:#3d3882;
  --teal:#2dd4bf;--teal2:#1a7a6e;
  --gold:#f0c060;--gold2:#b08840;
  --red:#f87171;--red2:#991b1b;
  --green:#4ade80;--green2:#166534;
  --orange:#fb923c;
  --text:#e2e4f0;--text2:#9095b8;--text3:#5a5f80;
  --tank:#60a5fa;--dps:#f87171;--healer:#4ade80;--any:#9095b8;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--surface);border:1px solid var(--border2);padding:2.5rem;width:360px;text-align:center}
.login-box h1{font-size:1.4rem;font-weight:600;margin-bottom:0.25rem;color:var(--purple)}
.login-box p{color:var(--text2);font-size:0.85rem;margin-bottom:1.5rem}
.login-box input{width:100%;padding:0.6rem 0.9rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:0.9rem;margin-bottom:0.75rem;outline:none}
.login-box input:focus{border-color:var(--purple)}
.login-box button{width:100%;padding:0.65rem;background:var(--purple2);color:#fff;border:none;cursor:pointer;font-size:0.9rem;font-weight:600}
.login-box button:hover{background:var(--purple)}
.login-error{color:var(--red);font-size:0.8rem;margin-top:0.5rem}
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0.5rem 1rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.logo{font-size:1rem;font-weight:700;color:var(--purple);white-space:nowrap}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;gap:1.5rem}
.turn-display{display:flex;align-items:center;gap:0.75rem}
.turn-label{font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.turn-captain{font-size:1rem;font-weight:700;color:var(--gold)}
.timer-ring{position:relative;width:48px;height:48px}
.timer-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:3}
.timer-ring .bg{stroke:var(--border)}
.timer-ring .fg{stroke:var(--teal);stroke-dasharray:138;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.5s}
.timer-ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700}
.header-right{display:flex;align-items:center;gap:0.5rem}
.btn{padding:0.35rem 0.8rem;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:0.78rem;border-radius:2px;white-space:nowrap}
.btn:hover{border-color:var(--border2);background:var(--surface3)}
.btn.danger{border-color:var(--red2);color:var(--red)}.btn.danger:hover{background:var(--red2)}
.btn.success{border-color:var(--teal2);color:var(--teal)}.btn.success:hover{background:var(--teal2)}
.btn.primary{border-color:var(--purple2);background:var(--purple2);color:#fff}.btn.primary:hover{background:var(--purple)}
.paused-banner{background:var(--orange);color:#000;text-align:center;padding:0.3rem;font-weight:700;font-size:0.85rem;display:none}
.paused-banner.visible{display:block}
main{flex:1;display:grid;grid-template-columns:320px 1fr 280px;gap:0;overflow:hidden}
#pool-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:0.65rem 0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem;flex-shrink:0}
.panel-title{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2)}
.pool-count{background:var(--surface3);color:var(--text2);padding:0.1rem 0.45rem;border-radius:2px;font-size:0.72rem}
.search-bar{padding:0.5rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:0.4rem}
.search-bar input{width:100%;padding:0.4rem 0.6rem;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:0.82rem;outline:none}
.search-bar input:focus{border-color:var(--purple)}
.filter-row{display:flex;gap:0.3rem;flex-wrap:wrap}
.filter-btn{padding:0.2rem 0.5rem;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:0.7rem;border-radius:2px}
.filter-btn.active{background:var(--purple3);border-color:var(--purple2);color:var(--text)}
.filter-btn.role-tank.active{background:#1e3a5f;border-color:var(--tank);color:var(--tank)}
.filter-btn.role-dps.active{background:#4a1515;border-color:var(--dps);color:var(--dps)}
.filter-btn.role-healer.active{background:#14432a;border-color:var(--healer);color:var(--healer)}
.player-list{flex:1;overflow-y:auto;padding:0.25rem}
.player-item{padding:0.45rem 0.6rem;cursor:pointer;border:1px solid transparent;border-radius:2px;margin-bottom:2px;display:flex;align-items:center;gap:0.5rem}
.player-item:hover{background:var(--surface2);border-color:var(--border)}
.player-item.selected{background:var(--surface3);border-color:var(--purple2)}
.player-item.highlight-want{background:#0d2a1a;border-color:var(--green2)}
.player-item.highlight-wont{background:#2a0d0d;border-color:var(--red2);opacity:0.5}
.role-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.role-dot.Tank{background:var(--tank)}.role-dot.DPS{background:var(--dps)}.role-dot.Healer{background:var(--healer)}
.player-name{font-size:0.82rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-class{font-size:0.7rem;color:var(--text2);white-space:nowrap}
.want-icon{font-size:0.65rem;color:var(--green);margin-left:auto}
.wont-icon{font-size:0.65rem;color:var(--red);margin-left:auto}
#roster-panel{background:var(--bg);overflow-y:auto;padding:0.75rem}
.captain-tabs{display:flex;gap:0.3rem;margin-bottom:0.75rem}
.cap-tab{padding:0.4rem 0.9rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.78rem;border-radius:2px;color:var(--text2)}
.cap-tab.active{border-color:var(--purple2);background:var(--purple3);color:var(--text)}
.roster-section{margin-bottom:1rem}
.roster-section-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:0.4rem;padding:0.2rem 0.4rem;border-left:2px solid var(--border2)}
.roster-slot{background:var(--surface);border:1px solid var(--border);padding:0.3rem 0.5rem;min-height:32px;display:flex;align-items:center;gap:0.4rem;cursor:pointer;border-radius:2px}
.roster-slot:hover{border-color:var(--border2)}.roster-slot.filled:hover{border-color:var(--red2)}
.slot-type{font-size:0.62rem;color:var(--text3);white-space:nowrap;min-width:55px}
.slot-type.Any{color:var(--any)}.slot-type.Tank{color:var(--tank)}.slot-type.DPS{color:var(--dps)}.slot-type.Support{color:var(--healer)}.slot-type.Spinner{color:var(--orange)}
.slot-player{font-size:0.78rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-remove{font-size:0.7rem;color:var(--red);margin-left:auto;opacity:0;padding:0 0.2rem}
.roster-slot:hover .slot-remove{opacity:1}
.slot-empty-text{font-size:0.72rem;color:var(--text3);font-style:italic}
#info-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.player-detail{padding:0.75rem;flex:1;overflow-y:auto}
.detail-name{font-size:1rem;font-weight:700;margin-bottom:0.2rem}
.detail-class{font-size:0.8rem;color:var(--text2);margin-bottom:0.75rem}
.detail-section{margin-bottom:0.75rem}
.detail-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:0.25rem}
.detail-value{font-size:0.82rem;color:var(--text);background:var(--surface2);padding:0.4rem 0.6rem;border-radius:2px}
.detail-tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:2px;font-size:0.72rem;margin:0.1rem;border:1px solid}
.tag-want{background:#0d2a1a;border-color:var(--green2);color:var(--green)}
.tag-wont{background:#2a0d0d;border-color:var(--red2);color:var(--red)}
.tag-avail{background:#2a1d00;border-color:var(--gold2);color:var(--gold)}
.pick-btn{width:100%;padding:0.6rem;background:var(--purple2);color:#fff;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;margin-top:0.5rem;border-radius:2px}
.pick-btn:hover{background:var(--purple)}
.no-selection{padding:1rem;color:var(--text3);font-size:0.82rem;text-align:center}
#slot-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:500}
#slot-modal.open{display:flex}
.slot-modal-box{background:var(--surface);border:1px solid var(--border2);padding:1.25rem;width:380px;max-height:80vh;overflow-y:auto}
.slot-modal-box h3{font-size:0.9rem;font-weight:600;margin-bottom:1rem;color:var(--purple)}
.slot-option{padding:0.5rem 0.75rem;border:1px solid var(--border);cursor:pointer;margin-bottom:0.3rem;border-radius:2px;display:flex;align-items:center;gap:0.5rem;font-size:0.82rem}
.slot-option:hover{border-color:var(--purple2);background:var(--surface2)}
#log-panel{background:var(--surface2);border-top:1px solid var(--border);max-height:140px;overflow-y:auto;flex-shrink:0}
.log-entry{padding:0.2rem 0.75rem;font-size:0.75rem;color:var(--text2);border-bottom:1px solid var(--border);display:flex;gap:0.75rem}
#admin-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:500}
#admin-modal.open{display:flex}
.admin-box{background:var(--surface);border:1px solid var(--border2);padding:1.5rem;width:400px}
.admin-box h3{font-size:1rem;font-weight:600;margin-bottom:1rem;color:var(--gold)}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hotkey-hint{font-size:0.68rem;color:var(--text3);text-align:center;padding:0.35rem;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h1>T&amp;L Draft Tool</h1>
    <p>Season 1 · Captain Access</p>
    <input type="password" id="pw-input" placeholder="Enter password..." onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Enter Draft Room</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div id="app">
  <div class="paused-banner" id="paused-banner">⏸ DRAFT PAUSED</div>
  <header>
    <div class="logo">T&amp;L Draft S1</div>
    <div class="header-center">
      <div class="turn-display">
        <div><div class="turn-label">Now Picking</div><div class="turn-captain" id="turn-captain">Arelite</div></div>
        <div class="timer-ring">
          <svg viewBox="0 0 48 48"><circle class="bg" cx="24" cy="24" r="22"/><circle class="fg" id="timer-circle" cx="24" cy="24" r="22"/></svg>
          <div class="timer-ring num" id="timer-num">40</div>
        </div>
        <div><div class="turn-label">Up Next</div><div style="font-size:0.85rem;font-weight:600;color:var(--text2)" id="turn-next">Rheggie</div></div>
      </div>
      <div style="text-align:center"><div class="turn-label">Round</div><div style="font-size:1rem;font-weight:700;color:var(--teal)" id="round-num">1</div></div>
      <div style="text-align:center"><div class="turn-label">Pick</div><div style="font-size:1rem;font-weight:700;color:var(--text)" id="pick-num">1 / 192</div></div>
      <div style="text-align:center"><div class="turn-label">Pool</div><div style="font-size:1rem;font-weight:700;color:var(--text)" id="pool-remaining">330</div></div>
    </div>
    <div class="header-right">
      <div style="font-size:0.72rem;color:var(--text3)">Stream:</div>
      <button class="btn" id="stream-toggle" onclick="toggleStreamMode()">Notes ON</button>
      <button class="btn" onclick="openAdmin()">Admin</button>
    </div>
  </header>
  <main>
    <div id="pool-panel">
      <div class="panel-header"><span class="panel-title">Player Pool</span><span class="pool-count" id="pool-count-badge">330</span></div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search name or class..." oninput="filterPlayers()"/>
        <div class="filter-row" id="role-filter-row">
          <button class="filter-btn active" onclick="setRoleFilter('All',this)">All</button>
          <button class="filter-btn role-tank" onclick="setRoleFilter('Tank',this)">Tank</button>
          <button class="filter-btn role-dps" onclick="setRoleFilter('DPS',this)">DPS</button>
          <button class="filter-btn role-healer" onclick="setRoleFilter('Healer',this)">Healer</button>
        </div>
        <div class="filter-row" id="class-filter-row" style="max-height:60px;overflow-y:auto;gap:0.25rem"></div>
      </div>
      <div class="player-list" id="player-list"></div>
    </div>
    <div id="roster-panel">
      <div class="captain-tabs" id="captain-tabs"></div>
      <div id="roster-board"></div>
    </div>
    <div id="info-panel">
      <div class="panel-header"><span class="panel-title">Player Info</span></div>
      <div class="player-detail" id="player-detail"><div class="no-selection">Click a player to view details</div></div>
      <div class="hotkey-hint">Press N to toggle notes</div>
    </div>
  </main>
  <div id="log-panel"></div>
</div>
<div id="slot-modal">
  <div class="slot-modal-box">
    <h3 id="slot-modal-title">Place player in slot</h3>
    <div id="slot-options"></div>
    <button class="btn" style="margin-top:0.5rem;width:100%" onclick="closeSlotModal()">Cancel</button>
  </div>
</div>
<div id="admin-modal">
  <div class="admin-box">
    <h3>Admin Controls</h3>
    <div class="admin-grid">
      <button class="btn success" onclick="adminAction('pause')">⏸ Pause</button>
      <button class="btn primary" onclick="adminAction('resume')">▶ Resume</button>
      <button class="btn" onclick="adminAction('undo')">↩ Undo Pick</button>
      <button class="btn" onclick="adminAction('skip')">⏭ Skip Turn</button>
      <button class="btn" onclick="adminAction('reset-timer')">⏱ Reset Timer</button>
      <button class="btn danger" onclick="adminAction('reset-draft')">⚠ Reset All</button>
    </div>
    <div style="margin-bottom:0.75rem">
      <div class="detail-label" style="margin-bottom:0.4rem">Force turn:</div>
      <div style="display:flex;gap:0.4rem;flex-wrap:wrap" id="force-turn-btns"></div>
    </div>
    <button class="btn" style="width:100%" onclick="closeAdmin()">Close</button>
  </div>
</div>
<script>
const PASSWORD='mizzelleisthebest';
const CIRCUMFERENCE=2*Math.PI*22;
const TIMER_SECONDS=40;
const TOTAL_PICKS=192;
const CAPTAINS=[
  {id:'arelite',name:'Arelite',color:'#7c6ff7',co:'Zaels'},
  {id:'rheggie',name:'Rheggie',color:'#2dd4bf',co:'Ruthless'},
  {id:'bora',name:'Bora',color:'#f0c060',co:'Soju'},
  {id:'wicked',name:'Wicked',color:'#f87171',co:'Rosie'},
];
function genOrder(n){const o=[];let r=1,pk=0;while(pk<n){const ev=r%2===0;const seq=ev?[3,2,1,0]:[0,1,2,3];for(const i of seq){if(pk>=n)break;o.push({ci:i,r});pk++;}r++;}return o;}
const PICK_ORDER=genOrder(TOTAL_PICKS);
function buildSlots(){
  const s={};
  for(const c of CAPTAINS){
    const l=[];
    const p1=[
      [{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'}],
      [{t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'}],
      [{t:'Any',lb:'Any Role'},{t:'Spinner',lb:'Spinner/DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'Tank',lb:'Tank'},{t:'Spinner',lb:'Spinner/DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
    ];
    const p2=[
      [{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'}],
      [{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
    ];
    const sub=[
      [{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'},{t:'Any',lb:'Any Role'}],
      [{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'},{t:'Tank',lb:'Tank'}],
      [{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'},{t:'DPS',lb:'DPS'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
      [{t:'Support',lb:'Support'},{t:'Support',lb:'Support'},{t:'Support',lb:'Support'}],
    ];
    for(let r=0;r<p1.length;r++)for(let cc=0;cc<p1[r].length;cc++)l.push({id:`${c.id}-p1-r${r}-c${cc}`,sec:'Party 1 — Objective / Spinner / Flex / Flex',t:p1[r][cc].t,lb:p1[r][cc].lb,player:null});
    for(let r=0;r<p2.length;r++)for(let cc=0;cc<p2[r].length;cc++)l.push({id:`${c.id}-p2-r${r}-c${cc}`,sec:'Party 2 — Flex / Flex / 3 DPS / 3 DPS',t:p2[r][cc].t,lb:p2[r][cc].lb,player:null});
    for(let r=0;r<sub.length;r++)for(let cc=0;cc<sub[r].length;cc++)l.push({id:`${c.id}-sub-r${r}-c${cc}`,sec:'Subs (18)',t:sub[r][cc].t,lb:sub[r][cc].lb,player:null});
    s[c.id]=l;
  }
  return s;
}
const PLAYERS=[
  {id:'keraunosv',n:'Keraunosツ',role:'Healer',cls:'Oracle',alts:'',notes:'',w:[],x:[]},
  {id:'pewf',n:'Pewf',role:'DPS',cls:'Fury',alts:'',notes:'',w:[],x:[]},
  {id:'ruthless',n:'Ruthlessssssss',role:'Tank',cls:'Steelheart',alts:'Crusader',notes:'Co-captain Rheggie team',w:[],x:[]},
  {id:'bearsawed',n:'BEARSAWED',role:'Healer',cls:'Oracle',alts:'Fury, Scout',notes:'',w:[],x:[]},
  {id:'katie',n:'Katie',role:'DPS',cls:'Enigma',alts:'Liberator',notes:'',w:[],x:[]},
  {id:'micheru',n:'Micheruメ',role:'Tank',cls:'Crusader',alts:'',notes:'Mainball/KS',w:[],x:[]},
  {id:'levityy',n:'Levityy',role:'Tank',cls:'Steelheart',alts:'Crusader',notes:'',w:[],x:[]},
  {id:'drav',n:'drav',role:'DPS',cls:'Ravager',alts:'',notes:'Killsquad. Prefers ムlexa and Plumb3rcrack as healers.',w:['mlexa','plumb3rcrack'],x:[]},
  {id:'desserti',n:'Desserti',role:'Healer',cls:'Oracle',alts:'',notes:'Built for spinner team.',w:[],x:[]},
  {id:'wolferwolf',n:'Wolferwolf',role:'Tank',cls:'Steelheart',alts:'',notes:'Tank party preferred',w:[],x:[]},
  {id:'trazodone',n:'Trazodone ッ',role:'Healer',cls:'Oracle',alts:'',notes:'',w:[],x:[]},
  {id:'dioxin',n:'Dioxin',role:'Healer',cls:'Seeker',alts:'',notes:'',w:[],x:[]},
  {id:'justin',n:'Justin',role:'DPS',cls:'Scorpion',alts:'Lunarch',notes:'Normalized from Curse Bomber',w:[],x:[]},
  {id:'cyclingpig',n:'cyclingpig',role:'Healer',cls:'Oracle',alts:'Seeker',notes:'',w:[],x:[]},
  {id:'plumb3rcrack',n:'Plumb3rcrack',role:'Healer',cls:'Oracle',alts:'',notes:'',w:[],x:[]},

let roleFilter='All',searchTerm='',classFilter='';

function doLogin(){
  if(document.getElementById('pw-input').value===PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    init();
  }else{
    document.getElementById('login-error').textContent='Incorrect password.';
  }
}

function init(){
  buildClassFilters();buildCaptainTabs();buildRosterBoard();
  buildForceTurnBtns();updateTurnDisplay();startTimer();buildPlayerList();
}

function startTimer(){
  clearInterval(state.tint);state.tsec=TIMER_SECONDS;updateTimerDisplay();
  state.tint=setInterval(()=>{
    if(state.paused)return;
    state.tsec--;updateTimerDisplay();
    if(state.tsec<=0)skipTurn();
  },1000);
}

function updateTimerDisplay(){
  const n=document.getElementById('timer-num');
  const c=document.getElementById('timer-circle');
  if(!n||!c)return;
  n.textContent=state.tsec;
  const offset=CIRCUMFERENCE*(1-state.tsec/TIMER_SECONDS);
  c.style.strokeDashoffset=offset;
  c.style.stroke=state.tsec>15?'var(--teal)':state.tsec>7?'var(--orange)':'var(--red)';
}

function getCap(){return CAPTAINS[PICK_ORDER[Math.min(state.pickIdx,PICK_ORDER.length-1)].ci];}
function getNext(){const ni=state.pickIdx+1;if(ni>=PICK_ORDER.length)return null;return CAPTAINS[PICK_ORDER[ni].ci];}

function updateTurnDisplay(){
  const c=getCap(),nx=getNext();
  const rnd=PICK_ORDER[Math.min(state.pickIdx,PICK_ORDER.length-1)].r;
  document.getElementById('turn-captain').textContent=c.name;
  document.getElementById('turn-captain').style.color=c.color;
  document.getElementById('turn-next').textContent=nx?nx.name:'—';
  document.getElementById('round-num').textContent=rnd;
  document.getElementById('pick-num').textContent=`${state.pickIdx+1} / ${TOTAL_PICKS}`;
  state.viewCap=c.id;
  buildCaptainTabs();buildRosterBoard();
}

function skipTurn(){addLog(null,getCap().name,'');advTurn();}

function advTurn(){
  state.pickIdx++;
  if(state.pickIdx>=PICK_ORDER.length){clearInterval(state.tint);alert('Draft Complete!');return;}
  updateTurnDisplay();startTimer();
}

function getDraftedIds(){
  const s=new Set();
  for(const c of CAPTAINS)for(const sl of state.slots[c.id])if(sl.player)s.add(sl.player.id);
  return s;
}

function buildClassFilters(){
  const classes=[...new Set(PLAYERS.map(p=>p.cls))].sort();
  document.getElementById('class-filter-row').innerHTML=classes.map(c=>
    `<button class="filter-btn" onclick="setClassFilter('${c}',this)">${c}</button>`).join('');
}

function setClassFilter(c,btn){
  classFilter=classFilter===c?'':c;
  document.querySelectorAll('#class-filter-row .filter-btn').forEach(b=>b.classList.remove('active'));
  if(classFilter)btn.classList.add('active');
  buildPlayerList();
}

function setRoleFilter(r,btn){
  roleFilter=r;
  document.querySelectorAll('#role-filter-row .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildPlayerList();
}

function filterPlayers(){searchTerm=document.getElementById('search-input').value.toLowerCase();buildPlayerList();}

function buildPlayerList(){
  const drafted=getDraftedIds();
  const wids=new Set(state.sel?state.sel.w:[]);
  const xids=new Set(state.sel?state.sel.x:[]);
  const fl=PLAYERS.filter(p=>{
    if(drafted.has(p.id))return false;
    if(roleFilter!=='All'&&p.role!==roleFilter)return false;
    if(classFilter&&p.cls!==classFilter)return false;
    if(searchTerm&&!p.n.toLowerCase().includes(searchTerm)&&!p.cls.toLowerCase().includes(searchTerm))return false;
    return true;
  });
  document.getElementById('pool-count-badge').textContent=fl.length;
  document.getElementById('pool-remaining').textContent=PLAYERS.length-drafted.size;
  document.getElementById('player-list').innerHTML=fl.map(p=>{
    const iw=wids.has(p.id),ix=xids.has(p.id),is=state.sel?.id===p.id;
    let cls='player-item';
    if(is)cls+=' selected';else if(iw)cls+=' highlight-want';else if(ix)cls+=' highlight-wont';
    return `<div class="${cls}" onclick="selPlayer('${p.id}')">
      <div class="role-dot ${p.role}"></div>
      <span class="player-name">${p.n}</span>
      <span class="player-class">${p.cls}</span>
      ${iw?'<span class="want-icon">♥</span>':ix?'<span class="wont-icon">✕</span>':''}
    </div>`;
  }).join('');
}

function selPlayer(id){state.sel=PLAYERS.find(p=>p.id===id)||null;buildPlayerList();renderDetail();}

function renderDetail(){
  const panel=document.getElementById('player-detail');
  const p=state.sel;
  if(!p){panel.innerHTML='<div class="no-selection">Click a player to view details</div>';return;}
  const cap=getCap();
  let wh='',xh='',nh='';
  if(p.w.length&&!state.stream){
    wh=`<div class="detail-section"><div class="detail-label">Wants to play with</div>
      ${p.w.map(id=>{const pl=PLAYERS.find(x=>x.id===id);return`<span class="detail-tag tag-want">${pl?pl.n:id}</span>`;}).join('')}
    </div>`;
  }
  if(p.x.length&&!state.stream){
    xh=`<div class="detail-section"><div class="detail-label">Won't play with</div>
      ${p.x.map(id=>{const pl=PLAYERS.find(x=>x.id===id);return`<span class="detail-tag tag-wont">${pl?pl.n:id}</span>`;}).join('')}
    </div>`;
  }
  if(p.notes&&!state.stream){
    nh=`<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-value">${p.notes}</div></div>`;
  }else if(state.stream){
    nh=`<div class="detail-section"><div class="detail-label" style="color:var(--text3)">[Notes hidden — stream mode]</div></div>`;
  }
  const avail=p.notes.includes('⚠')?`<div style="margin-bottom:.5rem"><span class="detail-tag tag-avail">⚠ ${p.notes.split('⚠')[1]?.trim()||'Restriction'}</span></div>`:'';
  panel.innerHTML=`
    <div class="detail-name">${p.n}</div>
    <div class="detail-class">${p.cls} · ${p.role}</div>
    ${avail}
    <div class="detail-section"><div class="detail-label">Alt classes</div><div class="detail-value">${p.alts||'None'}</div></div>
    ${wh}${xh}${nh}
    <button class="pick-btn" onclick="pickPlayer()">Draft for ${cap.name}</button>`;
}

function pickPlayer(){if(state.sel)openSlotModal(state.sel,getCap());}

function openSlotModal(player,cap){
  document.getElementById('slot-modal-title').textContent=`Place ${player.n} — ${cap.name}`;
  const empty=state.slots[cap.id].filter(s=>!s.player);
  document.getElementById('slot-options').innerHTML=empty.length?empty.map(s=>`
    <div class="slot-option" onclick="confirmPick('${s.id}')">
      <span class="slot-type ${s.t}">${s.lb}</span>
      <span style="flex:1;font-size:.72rem;color:var(--text2)">${s.sec}</span>
    </div>`).join(''):`<p style="color:var(--text3);font-size:.82rem">No empty slots</p>`;
  document.getElementById('slot-modal').classList.add('open');
}

function closeSlotModal(){document.getElementById('slot-modal').classList.remove('open');}

function confirmPick(slotId){
  const cap=getCap();
  const slot=state.slots[cap.id].find(s=>s.id===slotId);
  if(!slot||!state.sel)return;
  slot.player=state.sel;
  addLog(state.sel,cap.name,slot.lb);
  closeSlotModal();state.sel=null;
  buildPlayerList();renderDetail();buildRosterBoard();advTurn();
}

function addLog(player,cap,slot){
  const log=document.getElementById('log-panel');
  const e=document.createElement('div');e.className='log-entry';
  const c=getCap();
  if(player){
    e.innerHTML=`<span style="color:var(--text3)">#${state.pickIdx+1}</span><span style="color:${c.color};font-weight:600">${cap}</span><span style="color:var(--gold)">${player.n}</span><span style="color:var(--text3)">${player.cls} → ${slot}</span>`;
  }else{
    e.innerHTML=`<span style="color:var(--text3)">#${state.pickIdx+1}</span><span style="color:var(--orange)">SKIP — ${cap}</span>`;
  }
  log.insertBefore(e,log.firstChild);
  state.log.push({idx:state.pickIdx,player,cap,slot});
}

function buildCaptainTabs(){
  document.getElementById('captain-tabs').innerHTML=CAPTAINS.map(c=>`
    <button class="cap-tab ${state.viewCap===c.id?'active':''}" onclick="viewCap('${c.id}')" style="${state.viewCap===c.id?`border-color:${c.color};color:${c.color}`:''}">
      ${c.name} <span style="font-size:.65rem;color:var(--text3)">${state.slots[c.id].filter(s=>s.player).length}/66</span>
    </button>`).join('');
}

function viewCap(id){state.viewCap=id;buildCaptainTabs();buildRosterBoard();}

function buildRosterBoard(){
  const slots=state.slots[state.viewCap];
  const secs=[
    {title:'Party 1 — Objective / Spinner / Flex / Flex',pre:`${state.viewCap}-p1`,cols:4,rows:6},
    {title:'Party 2 — Flex / Flex / 3 DPS / 3 DPS',pre:`${state.viewCap}-p2`,cols:4,rows:6},
    {title:'Subs (18)',pre:`${state.viewCap}-sub`,cols:3,rows:6},
  ];
  document.getElementById('roster-board').innerHTML=secs.map(sec=>{
    const ss=slots.filter(s=>s.id.startsWith(sec.pre));
    const rows=[];
    for(let r=0;r<sec.rows;r++){
      const row=ss.filter(s=>s.id.includes(`-r${r}-`)).sort((a,b)=>{
        const ac=parseInt(a.id.match(/-c(\d+)$/)?.[1]||0);
        const bc=parseInt(b.id.match(/-c(\d+)$/)?.[1]||0);
        return ac-bc;
      });
      rows.push(row);
    }
    return `<div class="roster-section"><div class="roster-section-title">${sec.title}</div>
      ${rows.map(row=>`<div style="display:grid;grid-template-columns:repeat(${sec.cols},1fr);gap:3px;margin-bottom:3px">
        ${row.map(s=>s.player?
          `<div class="roster-slot filled" onclick="removeSlot('${s.id}')" title="Click to remove">
            <div class="role-dot ${s.player.role}" style="flex-shrink:0"></div>
            <span class="slot-player">${s.player.n}</span>
            <span class="slot-remove">✕</span>
          </div>`:
          `<div class="roster-slot"><span class="slot-type ${s.t}">${s.lb}</span><span class="slot-empty-text">empty</span></div>`
        ).join('')}
      </div>`).join('')}
    </div>`;
  }).join('');
}

function removeSlot(id){
  for(const c of CAPTAINS){
    const sl=state.slots[c.id].find(s=>s.id===id);
    if(sl&&sl.player){
      if(!confirm(`Remove ${sl.player.n}?`))return;
      sl.player=null;buildRosterBoard();buildPlayerList();return;
    }
  }
}

function toggleStreamMode(){
  state.stream=!state.stream;
  document.getElementById('stream-toggle').textContent=state.stream?'Notes OFF':'Notes ON';
  if(state.sel)renderDetail();
}

function openAdmin(){document.getElementById('admin-modal').classList.add('open');}
function closeAdmin(){document.getElementById('admin-modal').classList.remove('open');}

function buildForceTurnBtns(){
  document.getElementById('force-turn-btns').innerHTML=CAPTAINS.map((c,i)=>
    `<button class="btn" style="border-color:${c.color};color:${c.color}" onclick="forceTurn(${i})">${c.name}</button>`).join('');
}

function forceTurn(idx){
  clearInterval(state.tint);
  for(let i=state.pickIdx;i<PICK_ORDER.length;i++){if(PICK_ORDER[i].ci===idx){state.pickIdx=i;break;}}
  updateTurnDisplay();startTimer();closeAdmin();
}

function adminAction(a){
  if(a==='pause'){state.paused=true;document.getElementById('paused-banner').classList.add('visible');}
  else if(a==='resume'){state.paused=false;document.getElementById('paused-banner').classList.remove('visible');}
  else if(a==='skip'){skipTurn();closeAdmin();}
  else if(a==='undo'){
    if(!state.log.length)return;
    const last=state.log.pop();
    if(last.player){for(const c of CAPTAINS){const sl=state.slots[c.id].find(s=>s.player?.id===last.player.id);if(sl){sl.player=null;break;}}}
    state.pickIdx=Math.max(0,state.pickIdx-1);
    updateTurnDisplay();startTimer();buildPlayerList();buildRosterBoard();closeAdmin();
  }
  else if(a==='reset-timer'){startTimer();closeAdmin();}
  else if(a==='reset-draft'){
    if(!confirm('Reset entire draft? All picks will be lost!'))return;
    state.slots=buildSlots();state.pickIdx=0;state.log=[];state.sel=null;
    updateTurnDisplay();startTimer();buildPlayerList();buildRosterBoard();
    document.getElementById('log-panel').innerHTML='';closeAdmin();
  }
}

document.addEventListener('keydown',e=>{
  if((e.key==='n'||e.key==='N')&&document.activeElement.tagName!=='INPUT')toggleStreamMode();
});
document.getElementById('slot-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('slot-modal'))closeSlotModal();
});
document.getElementById('admin-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('admin-modal'))closeAdmin();
});
</script>
</body>
</html>
